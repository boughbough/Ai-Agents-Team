<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Flights - FlightReserva</title>
    <meta name="description" content="Browse all available flights on FlightReserva">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body> 
    <!-- Navbar (same as index.html) -->
    <header class="navbar navbar--solid fade-in" aria-label="Main navigation">
  <div class="logo"><a href="index.html">FlightReserva</a></div>
  <nav class="nav-links" aria-label="Primary" id="primary-navigation">
    <a href="index.html">Accueil</a>
    <a href="flights.html" class="active">Vols</a>
    <a href="about.html">A propos</a>
    <a href="contact.html">Contact</a>
  </nav>
  <button class="menu-toggle" aria-controls="primary-navigation" aria-expanded="false" aria-label="Toggle menu">
    <svg width="24" height="24" viewBox="0 0 100 80" fill="currentColor">
      <rect width="100" height="12"></rect>
      <rect y="30" width="100" height="12"></rect>
      <rect y="60" width="100" height="12"></rect>
    </svg>
  </button>
</header>

    <!-- Filters Section -->
    <section id="filters-section" class="filters-section">
        <div class="container">
            <h2>Parcourir tous les vols</h2>
            <div class="filters-grid">
                <div class="filter-field">
                    <label for="f-origin">De</label>
                    <select id="f-origin"><option value="">Toutes les origines</option></select>
                </div>
                <div class="filter-field">
                    <label for="f-destination">À</label>
                    <select id="f-destination"><option value="">Toutes les destinations</option></select>
                </div>
                <div class="filter-field">
                    <label for="f-airline">Compagnie</label>
                    <select id="f-airline"><option value="">Toutes les compagnies</option></select>
                </div>
                <div class="filter-field">
                    <label for="f-class">Classe</label>
                    <select id="f-class">
                        <option value="">Toutes les classes</option>
                        <option value="economy">Economy</option>
                        <option value="business">Business</option>
                        <option value="first">First</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="f-date-from">Date de départ</label>
                    <input type="date" id="f-date-from" />
                </div>
                <div class="filter-field">
                    <label for="f-date-to">Date de fin</label>
                    <input type="date" id="f-date-to" />
                </div>
                <div class="filter-field">
                    <label for="f-price-max">Prix maximum ($)</label>
                    <input type="number" id="f-price-max" placeholder="e.g. 500" min="0" />
                </div>
                <div class="filter-field">
                    <label for="f-duration">Durée maximum</label>
                    <select id="f-duration">
                        <option value="">Toute durée</option>
                        <option value="240">Moins de 4h</option>
                        <option value="480">Moins de 8h</option>
                        <option value="720">Moins de 12h</option>
                        <option value="960">Moins de 16h</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="f-seats">Places minimum</label>
                    <input type="number" id="f-seats" placeholder="e.g. 2" min="1" />
                </div>
            </div>
            <div class="filters-actions">
                <button id="btn-apply" class="button">Appliquer</button>
                <button id="btn-reset" class="button button--secondary">Réinitialiser</button>
            </div>
            <div id="results-count" class="results-count"></div>
        </div>
    </section>

    <!-- Table Section -->
    <section id="table-section" class="table-section">
        <div class="container">
            <div class="table-wrapper">
                <table id="flights-table" class="flights-table">
                    <thead>
                        <tr>
                            <th>Réserver</th>
                            <th data-sort="id">ID</th>
                            <th data-sort="airline">Compagnie</th>
                            <th data-sort="origin">De</th>
                            <th data-sort="destination">À</th>
                            <th data-sort="departDate">Date</th>
                            <th data-sort="departTime">Départ</th>
                            <th data-sort="arrivalTime">Arrivée</th>
                            <th data-sort="duration">Durée</th>
                            <th data-sort="flightClass">Classe</th>
                            <th data-sort="price">Prix</th>
                            <th data-sort="seatsAvailable">Places</th>
                        </tr>
                    </thead>
                    <tbody id="flights-tbody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </section>

    <!-- Footer (same as index.html) -->
    <footer>
        <p>&copy; 2026 Flight Reserva. Tous droits réservés.</p>
    </footer>

    <!-- Scripts -->
    <script src="js/FlightData.js"></script>
    <script src="js/flightsTable.js"></script>

<script>
// Navbar fade-in
document.querySelector('.navbar').classList.add('visible');
// Hamburger menu toggle
const menuToggle = document.querySelector('.menu-toggle');
const navLinks = document.querySelector('.nav-links');
if (menuÀggle && navLinks) {
  menuToggle.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('active');
    menuToggle.setAttribute('aria-expanded', isOpen);
  });
}
</script>
</body>
</html>
